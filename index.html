<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>สแกนสินค้า ศิษย์พี่ - Offline First Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- นำเข้าไลบรารี -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- ไฟล์ CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="wakeScanner()">
    
    <div id="printArea"></div>

    <div id="headerBar">
        <div style="display:flex; align-items:center;">
            <select id="modeSelect" onchange="changeMode(this.value)">
                <option value="SELL">ขาย</option>
                <option value="BUY">ซื้อ</option>
                <option value="CHECK">เช็ค</option>
            </select>
        </div>

        <select id="reportMenu" onchange="handleMenuAction(this.value)" style="padding: 5px; border-radius: 5px; max-width: 90px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #fff;">
            <option value="" disabled selected>📜 เมนู</option>
            <option value="force-sync" style="background:#2c3e50;">📥 อัปเดตข้อมูล</option>
            <optgroup label="📋 พิมพ์">
                <option value="print-cart">พิมพ์ ตะกร้าสินค้า</option>
                <option value="print-today">พิมพ์ ยอดวันนี้</option>
                <option value="print-low">พิมพ์ สต็อกใกล้หมด</option>
                <option value="print-best">พิมพ์ สินค้าขายดี</option>
            </optgroup>
            <optgroup label="✈️ Telegram">
                <option value="tg-low">แจ้งสต็อกใกล้หมด</option>
                <option value="tg-best">แจ้งสินค้าขายดี</option>
                <option value="tg-info">ข้อมูลร้าน</option>
            </optgroup>
        </select>
        <div style="display:flex; align-items:center;">
            <div id="versionTag" style="font-size: 0.7em; color: #f1c40f; margin-right: 5px;"></div>
            <div id="clock">--:--:--</div>
            <div id="syncBadge">รอยืนยัน 0</div>
        </div>
    </div>

    <!-- 🌟 เริ่มส่วนที่อัปเดตกล่องซ้อนทับ (Wrapper & Overlay) 🌟 -->
    <div id="scanner-wrapper" style="position: relative; width: 100%;">
        <div id="reader" style="width: 100%;"></div>
        
        <!-- ค้นหาบรรทัดนี้ใน index.html แล้วแก้ top และ left ดังนี้ครับ -->
        <div id="scan-preview-overlay" style="display:none; position:absolute; top: 80px; left: 50%; transform: translateX(-50%); width:120px; z-index:99999; background:rgba(255,255,255,0.9); border:3px solid rgba(32, 245, 4, 0.89); border-radius:8px; padding:5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none;">
            <img id="last-scanned-img" src="" style="width:100%; height:auto; border-radius:4px;">
            <p style="color:red; text-align:center; margin:5px 0 0 0; font-size:12px; font-weight:bold;">ล่าสุด</p>
        </div>
    </div>
    <!-- 🌟 จบส่วนที่อัปเดต 🌟 -->

    <div id="sleepOverlay" onclick="wakeScanner()">💤 กดที่นี่เพื่อสแกนสินค้า</div>
    <div id="flash-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; z-index:999999; pointer-events:none; transition: opacity 0.1s;"></div>
    <div id="cart">
        <h3 style="margin:0 0 4px 0;text-align:center;color:#fff;font-size:1em">บาร์โค้ด สินค้า</h3>
        <div class="cart-header"><span>รูป</span><span>บาร์โค้ด</span><span>จำนวน</span><span>ราคา</span><span>ทุน</span><span>สต็อก</span><span>ร้าน</span><span>ลบ</span></div>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        
        <div class="bottom-bar">
            <button id="btnCancelBtn" onclick="cancelBasket()">ยกเลิก</button>
            <button id="btnFinish" class="btn-finish" onclick="finishSale()">ชำระเงิน</button>
            <button id="btnNewBarcode" onclick="showBarcodePreview(event)">📸 ถ่าย</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
