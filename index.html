<!DOCTYPE html>
<html>
<head>
    <title>สแกนสินค้า ศิษย์พี่ Zen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* ปรับให้ทุกอย่างเต็ม 100% ของหน้าจอ */
        html, body { margin: 0; padding: 0; background: #000; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* ให้ส่วนกล้องยืดออกเต็มพื้นที่ */
        #reader { position: absolute; top: 0; left: 0; width: 100%; height: 60%; z-index: 1; }
        #reader__filescan_input, #reader__filescan_input + span, #reader__filescan_input + a { display: none !important; }
        #reader button { padding: 8px 15px !important; font-size: 0.9em !important; border-radius: 5px !important; }
        
        /* ตะกร้าสินค้าอยู่ด้านล่างและขยายเต็มพื้นที่ที่เหลือ */
        #cart { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; 
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px 20px 0 0; padding: 15px; z-index: 100;
            box-sizing: border-box; display: flex; flex-direction: column;
        }
        
        #itemList { flex-grow: 1; overflow-y: auto; list-style-type: none; padding: 0; margin: 10px 0; border-top: 1px solid #ccc; }
        .item-row { padding: 8px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .item-row img { width: 45px; height: 45px; margin-right: 10px; border-radius: 5px; object-fit: cover; }
        .item-price { width: 80px; padding: 8px; text-align: center; border: 1px solid #999; border-radius: 4px; }
        .btn-finish { width: 100%; padding: 15px; font-size: 1.2em; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #statusMessage { color: #d35400; font-weight: bold; text-align: center; height: 20px; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="cart">
        <h3 style="margin: 0; text-align: center;">ตะกร้าสินค้า</h3>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        <button id="btnFinish" class="btn-finish" onclick="finishSale()">ชำระเงิน 0 บาท</button>
    </div>

    <script>
        let scannedItems = []; 
        let html5QrcodeScanner;

        function showStatus(msg) {
            const statusDiv = document.getElementById("statusMessage");
            statusDiv.innerText = msg;
            setTimeout(() => { statusDiv.innerText = ""; }, 2000);
        }

        function calculateTotal() {
            let total = 0;
            const prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            scannedItems.forEach(item => { total += parseFloat(prices[item.code] || 0); });
            document.getElementById("btnFinish").innerText = "ชำระเงิน " + total + " บาท";
        }

        function updateLocalPrice(code, price) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            prices[code] = price;
            localStorage.setItem('productPrices', JSON.stringify(prices));
            calculateTotal();
        }

        function getSavedPrice(code) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            return prices[code] || ''; 
        }

        async function onScanSuccess(decodedText, decodedResult) {
            // ป้องกันการสแกนซ้ำรัวๆ
            html5QrcodeScanner.pause();
            new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            
            let price = getSavedPrice(decodedText);
            let newItem = { code: decodedText };
            scannedItems.push(newItem);

            let li = document.createElement("li");
            li.className = "item-row";
            li.innerHTML = `<span>${decodedText}</span> 
                            <input type="number" class="item-price" value="${price}" placeholder="ราคา" 
                            onchange="updateLocalPrice('${decodedText}', this.value)">`;
            
            document.getElementById("itemList").appendChild(li);
            li.scrollIntoView({ behavior: 'smooth', block: 'end' });
            calculateTotal();
            
            setTimeout(() => { html5QrcodeScanner.resume(); }, 1500); 
        }

        function finishSale() {
            if (scannedItems.length === 0) return showStatus("ยังไม่มีสินค้าครับ!");
            showStatus("✅ บันทึกรายการเรียบร้อย!");
            scannedItems = [];
            document.getElementById("itemList").innerHTML = "";
            calculateTotal();
        }

        window.onload = () => {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, qrbox: { width: 250, height: 150 }, facingMode: "environment" 
            });
            html5QrcodeScanner.render(onScanSuccess);
        };
    </script>
</body>
</html>
