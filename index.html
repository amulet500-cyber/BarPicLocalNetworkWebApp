<!DOCTYPE html>
<html>
<head>
    <title>สแกนสินค้า ศิษย์พี่ Zen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* กล้องสแกนอยู่ด้านบนสุด */
        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 60vh; z-index: 1; }
        #reader__filescan_input, #reader__filescan_input + span, #reader__filescan_input + a { display: none !important; }
        #reader button { padding: 8px 15px !important; font-size: 0.9em !important; border: none !important; border-radius: 5px !important; color: white !important; }
        
        /* ตะกร้าสินค้าอยู่ด้านล่าง โปร่งแสง */
        #cart { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0; padding: 15px; z-index: 100;
            box-sizing: border-box; display: flex; flex-direction: column;
        }
        
        #itemList { flex-grow: 1; overflow-y: auto; list-style-type: none; padding: 0; margin: 0 0 10px 0; border-top: 1px solid #ccc; }
        .item-row { padding: 8px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; font-size: 0.9em; }
        .item-row img { width: 40px; height: 40px; margin-right: 10px; border: 1px solid #ccc; object-fit: cover; }
        .item-price { width: 60px; padding: 5px; text-align: center; border: 1px solid #999; border-radius: 4px; }
        .btn-finish { width: 100%; padding: 12px; font-size: 1.2em; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #statusMessage { color: #d35400; font-weight: bold; text-align: center; height: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <video id="cameraStream" style="display:none;"></video>
    <canvas id="snapshotCanvas" style="display:none;"></canvas>

    <div id="cart">
        <h3 style="margin: 0 0 5px 0; text-align: center;">ตะกร้าสินค้า</h3>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        <button id="btnFinish" class="btn-finish" onclick="finishSale()">ชำระเงิน 0 บาท</button>
    </div>

    <script>
        const SERVER_IP = '192.168.1.200';
        let scannedItems = []; 
        let html5QrcodeScanner;

        function showStatus(msg) {
            const statusDiv = document.getElementById("statusMessage");
            statusDiv.innerText = msg;
            setTimeout(() => { statusDiv.innerText = ""; }, 3000);
        }

        function calculateTotal() {
            let total = 0;
            const prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            scannedItems.forEach(item => { total += parseFloat(prices[item.code] || 0); });
            document.getElementById("btnFinish").innerText = "ชำระเงิน " + total + " บาท";
        }

        function takeSnapshot() {
            const video = document.getElementsByTagName('video')[0];
            const canvas = document.getElementById('snapshotCanvas');
            if (video && video.videoWidth > 0) {
                canvas.width = 100; canvas.height = 100;
                canvas.getContext('2d').drawImage(video, 0, 0, 100, 100);
                return canvas.toDataURL('image/jpeg', 0.5);
            }
            return "";
        }

        function updateLocalPrice(code, price) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            prices[code] = price;
            localStorage.setItem('productPrices', JSON.stringify(prices));
            calculateTotal();
        }

        function getSavedPrice(code) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            return prices[code] || ''; 
        }

        async function onScanSuccess(decodedText, decodedResult) {
            new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            let imgData = takeSnapshot(); 
            let price = getSavedPrice(decodedText);
            let newItem = { code: decodedText, img: imgData, price: price, time: new Date().toLocaleTimeString() };
            scannedItems.push(newItem);

            let li = document.createElement("li");
            li.className = "item-row";
            li.innerHTML = `<img src="${imgData}"> <span>${decodedText.substring(0,8)}</span> 
                            <input type="number" class="item-price" value="${price}" placeholder="ราคา" onchange="updateLocalPrice('${decodedText}', this.value)">`;
            
            document.getElementById("itemList").appendChild(li);
            li.scrollIntoView({ behavior: 'smooth', block: 'end' });
            calculateTotal();

            fetch(`http://${SERVER_IP}:5000/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: [newItem] })
            }).catch(() => showStatus("⚠️ ออฟไลน์: บันทึกในเครื่อง"));
            
            html5QrcodeScanner.pause();
            setTimeout(() => { html5QrcodeScanner.resume(); }, 1500); 
        }

        function finishSale() {
            if (scannedItems.length === 0) return showStatus("ยังไม่มีสินค้าครับ!");
            fetch(`http://${SERVER_IP}:5000/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "finish" })
            }).then(() => {
                showStatus("✅ ชำระเงินสำเร็จ!");
                scannedItems = [];
                document.getElementById("itemList").innerHTML = "";
                calculateTotal();
            }).catch(() => {
                showStatus("⚠️ ออฟไลน์: บันทึกในมือถือแล้ว");
                scannedItems = [];
                document.getElementById("itemList").innerHTML = "";
                calculateTotal();
            });
        }

        window.onload = () => {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, qrbox: { width: 200, height: 80 }, facingMode: "environment" 
            });
            html5QrcodeScanner.render(onScanSuccess);
        };
    </script>
</body>
</html>
