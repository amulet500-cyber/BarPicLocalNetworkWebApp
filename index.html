<!DOCTYPE html>
<html>
<head>
    <title>สแกนสินค้า ศิษย์พี่ Zen - Sync GoogleSheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="wakeScanner()">
    <div id="headerBar">
        <select id="modeSelect" onchange="changeMode(this.value)">
            <option value="SELL">ขาย</option>
            <option value="BUY">ซื้อ</option>
            <option value="CHECK">เช็ค</option>
        </select>
        <div id="clock">--:--:--</div>
    </div>
    <div id="reader"></div>
    <div id="sleepOverlay" onclick="wakeScanner()">💤 กดที่นี่เพื่อสแกนสินค้า</div>
    <div id="cart">
        <h3 style="margin:0 0 4px 0;text-align:center;color:#fff;font-size:1em">ตะกร้าสินค้า</h3>
        <div class="cart-header"><span>รูป</span><span>บาร์โค้ด</span><span>จำนวน</span><span>ราคา</span><span>ทุน</span><span>สต็อก</span><span>ร้าน</span><span>ลบ</span></div>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        <div style="display:flex;gap:3px">
            <button class="btn-cancel" onclick="cancelBasket()">ยกเลิก</button>
            <button id="btnReport" class="btn-report" onclick="sendReport()" style="display:none; background-color:#8e44ad; color:#fff; border:none; border-radius:5px; flex:1; cursor:pointer; font-weight:bold;">ส่งรายงาน Telegram</button>
            <button id="btnFinish" class="btn-finish" onclick="finishSale()">ชำระเงิน</button>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycg8de6efutKRLsoT8s6AQh3eJaEGmSOUV4kP4jhO9iUMimOzT3tbtcQcJaZArsyzb/exec";

        let groupedItems={}, html5QrcodeScanner, idleTimer, isScanning=true;
        let currentSpeech = null; // 🌟 ป้องกัน Garbage Collection Bug

        // 🌟 ฟังก์ชันเสียงพูดภาษาไทย (ปรับปรุงใหม่)
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // เคลียร์คิวเสียงเก่าที่อาจค้างอยู่
                currentSpeech = new SpeechSynthesisUtterance(text);
                currentSpeech.lang = 'th-TH'; // กำหนดเป็นภาษาไทย
                window.speechSynthesis.speak(currentSpeech);
            }
        }

        function applyModeColor(mode){
            const header = document.getElementById('headerBar');
            const btn = document.getElementById('btnFinish');
            const colors = {'SELL':'#27ae60', 'BUY':'#f1c40f', 'CHECK':'#3498db'};
            header.style.backgroundColor = colors[mode] || '#27ae60';
            btn.style.backgroundColor = colors[mode] || '#27ae60';
        }

        function changeMode(m){
            localStorage.setItem('zenMode',m);
            applyModeColor(m);
            showStatus("โหมด: "+m);
            
            if (m === 'CHECK') {
                document.getElementById('btnReport').style.display = 'block';
            } else {
                document.getElementById('btnReport').style.display = 'none';
            }

            calculateTotal();
            refreshList();
        }

        function resetIdleTimer(){clearTimeout(idleTimer); idleTimer=setTimeout(sleepScanner,300000)}
        function sleepScanner(){if(isScanning){html5QrcodeScanner.clear().then(()=>{isScanning=false;document.getElementById('sleepOverlay').style.display='flex';showStatus("💤 พักสแกนเนอร์")})}}
        
        function wakeScanner(){
            if(!isScanning){
                isScanning=true;
                document.getElementById('sleepOverlay').style.display='none';
                showStatus("📷 พร้อมสแกน");
                html5QrcodeScanner.render(onScanSuccess);
                resetIdleTimer();
            }
            // 🌟 แอบปลดล็อกเสียงเบราว์เซอร์เมื่อมีการแตะหน้าจอ
            if('speechSynthesis' in window) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            }
        }
        
        setInterval(()=>{
            const n=new Date();
            const dateStr = n.toLocaleDateString('th-TH',{weekday:'short', day:'numeric', month:'short', year:'numeric'});
            const timeStr = n.toLocaleTimeString('th-TH',{hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('clock').innerText = dateStr + ' ' + timeStr;
        }, 1000);

        function showStatus(m){const s=document.getElementById("statusMessage");s.innerText=m;setTimeout(()=>{s.innerText=""},3000)}
        
        async function loadSheetData() {
            showStatus("กำลังซิงค์ข้อมูลล่าสุดจากชีต...");
            try {
                const cacheBusterUrl = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.includes('?') ? '&' : '?') + '_=' + new Date().getTime();
                let response = await fetch(cacheBusterUrl);
                let data = await response.json();
                
                let formattedData = {};
                for (const [code, info] of Object.entries(data)) {
                    formattedData[code] = {
                        price: { val: info.price },
                        cost: { val: info.cost },
                        stock: { val: info.stock },
                        supplier: { val: info.supplier }
                    };
                }
                localStorage.setItem('productData', JSON.stringify(formattedData));
                refreshList();
                calculateTotal();
                showStatus("✅ ซิงค์สต็อกตรงกับชีตแล้ว!");
            } catch (error) {
                console.error("Error loading sheet data:", error);
                showStatus("⚠️ ซิงค์ล้มเหลว กำลังใช้ข้อมูลล่าสุดในเครื่อง");
            }
        }

        function changeQty(code, newValue) {
            let newQty = parseInt(newValue) || 0;
            if (newQty < 0) newQty = 0;
            let oldQty = parseInt(groupedItems[code].qty) || 0;
            let diff = newQty - oldQty;
            
            groupedItems[code].qty = newQty;
            
            let data = JSON.parse(localStorage.getItem('productData')||'{}');
            let mode = localStorage.getItem('zenMode') || 'SELL';
            
            if(data[code]) {
                if (mode === 'SELL') data[code].stock.val = parseInt(data[code].stock.val || 0) - diff;
                else if (mode === 'BUY') data[code].stock.val = parseInt(data[code].stock.val || 0) + diff;
                localStorage.setItem('productData', JSON.stringify(data));
            }
            
            calculateTotal();
            refreshList();
        }

        function removeItem(code){ 
            let data = JSON.parse(localStorage.getItem('productData')||'{}');
            let mode = localStorage.getItem('zenMode') || 'SELL';
            
            if(data[code]) {
                if(mode === 'SELL') data[code].stock.val = parseInt(data[code].stock.val || 0) + groupedItems[code].qty;
                else if(mode === 'BUY') data[code].stock.val = parseInt(data[code].stock.val || 0) - groupedItems[code].qty;
                localStorage.setItem('productData', JSON.stringify(data));
            }
            
            delete groupedItems[code]; 
            refreshList(); 
            calculateTotal(); 
        }

        function autoScrollToBottom(){ const list = document.getElementById("itemList"); list.scrollTop = list.scrollHeight; }
        function refreshList(){ const i=document.getElementById("itemList"); i.innerHTML=""; Object.values(groupedItems).forEach(x=>renderItem(x)); autoScrollToBottom(); }
        
        function cancelBasket(){ 
            if(confirm("ยกเลิกทั้งตะกร้าใช่ไหม?")){ 
                let data = JSON.parse(localStorage.getItem('productData')||'{}');
                let mode = localStorage.getItem('zenMode') || 'SELL';
                Object.values(groupedItems).forEach(item => {
                    if(data[item.code]) {
                        if(mode === 'SELL') data[item.code].stock.val = parseInt(data[item.code].stock.val || 0) + item.qty;
                        else if(mode === 'BUY') data[item.code].stock.val = parseInt(data[item.code].stock.val || 0) - item.qty;
                    }
                });
                localStorage.setItem('productData', JSON.stringify(data));
                groupedItems={}; 
                refreshList(); 
                calculateTotal(); 
            } 
        }
        
        function calculateTotal(){
            let t=0, d=JSON.parse(localStorage.getItem('productData')||'{}');
            let mode = localStorage.getItem('zenMode') || 'SELL';
            let count = Object.keys(groupedItems).length;
            Object.values(groupedItems).forEach(i=>{
                if(mode === 'SELL'){ let p = d[i.code] && d[i.code].price ? d[i.code].price.val : 0; t += (parseFloat(p) * i.qty) || 0; }
                else if(mode === 'BUY'){ let c = d[i.code] && d[i.code].cost ? d[i.code].cost.val : 0; t += (parseFloat(c) * i.qty) || 0; }
            });
            const btn = document.getElementById("btnFinish");
            if(mode === 'CHECK'){ btn.innerText = "(" + count + ") ตรวจสอบรายการ"; }
            else if(mode === 'BUY'){ btn.innerText = "(" + count + ") จ่ายเงิน " + t + " บาท"; }
            else { btn.innerText = "(" + count + ") ชำระเงิน " + t + " บาท"; }
            return t; 
        }

        function updateCellData(c,f,v){
            let a=JSON.parse(localStorage.getItem('productData')||'{}');
            if(!a[c])a[c]={price:{val:0},cost:{val:0},stock:{val:0},supplier:{val:''}};
            a[c][f]={val:v};
            localStorage.setItem('productData',JSON.stringify(a));
            if(f==='price'||f==='cost') calculateTotal();
        }

        function getCellData(c,f,d){ let a=JSON.parse(localStorage.getItem('productData')||'{}'); return(a[c]&&a[c][f])?a[c][f].val:d }
        
        function renderItem(i){
            let l=document.createElement("li");l.className="item-row";
            let p=getCellData(i.code,'price',0), c=getCellData(i.code,'cost',0), s=getCellData(i.code,'stock',0), st=(parseFloat(c)>0)?"cost-filled":"cost-empty";
            let mode = localStorage.getItem('zenMode') || 'SELL';
            let costClass = (mode === 'SELL') ? 'hidden-cost' : 'visible-cost';
            
            l.innerHTML=`<img src="${i.img}"><span class="barcode-text">${i.code}</span>
            <input type="number" class="item-input" value="${i.qty}" onfocus="this.select()" onchange="changeQty('${i.code}', this.value)">
            <input type="number" class="item-input" value="${p}" onfocus="this.select()" onchange="updateCellData('${i.code}','price',this.value);calculateTotal()">
            <input type="number" class="item-input cost-input ${costClass} ${st}" value="${c}" onfocus="this.select()" onclick="toggleCostVisibility(this)" onchange="updateCellData('${i.code}','cost',this.value);calculateTotal()">
            <input type="number" class="item-input" value="${s}" onfocus="this.select()" onchange="updateCellData('${i.code}','stock',this.value)">
            <input type="text" class="item-input" maxlength="1" value="${getCellData(i.code,'supplier','').toString().substring(0,1)}" onfocus="this.select()" onchange="updateCellData('${i.code}','supplier',this.value)">
            <button class="btn-delete" onclick="removeItem('${i.code}')">X</button>`;
            document.getElementById("itemList").appendChild(l);
        }

        function toggleCostVisibility(el){el.classList.toggle('hidden-cost');el.classList.toggle('visible-cost')}
        
        async function onScanSuccess(d){
            new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            let mode = localStorage.getItem('zenMode') || 'SELL';
            
            if(groupedItems[d]){ 
                changeQty(d, parseInt(groupedItems[d].qty) + 1);
            } else { 
                groupedItems[d] = {code:d, img:takeSnapshot(), qty:1}; 
                let data = JSON.parse(localStorage.getItem('productData')||'{}');
                if (mode === 'SELL') { if(data[d]){ data[d].stock.val = parseInt(data[d].stock.val || 0) - 1; localStorage.setItem('productData', JSON.stringify(data)); } }
                else if (mode === 'BUY') { if(data[d]){ data[d].stock.val = parseInt(data[d].stock.val || 0) + 1; localStorage.setItem('productData', JSON.stringify(data)); } }
                refreshList(); 
                calculateTotal(); 
            }

            setTimeout(() => {
                const listItems = document.getElementById("itemList").getElementsByClassName("item-row");
                for (let item of listItems) {
                    if (item.querySelector('.barcode-text').innerText === d) {
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        item.style.backgroundColor = "rgba(241, 196, 15, 0.3)";
                        setTimeout(() => item.style.backgroundColor = "", 500);
                        break;
                    }
                }
            }, 100);
            
            html5QrcodeScanner.pause(); 
            showStatus("✅ เพิ่มลงตะกร้าแล้ว"); 
            setTimeout(()=>{if(isScanning)html5QrcodeScanner.resume()},1500);
        }

        function takeSnapshot(){ 
            const v=document.getElementsByTagName('video')[0], c=document.createElement('canvas'); 
            if(v && v.videoWidth > 0){
                c.width=100; c.height=100; 
                c.getContext('2d').drawImage(v,0,0,100,100);
                return c.toDataURL('image/jpeg',0.5)
            } 
            return "" 
        }

        async function createCollage(items) {
            if (items.length === 0) return ""; 

            const THUMB_SIZE = 100;
            let cols = 4;
            let rows = Math.ceil(items.length / cols);

            let canvas = document.createElement('canvas');
            canvas.width = cols * THUMB_SIZE;
            canvas.height = rows * THUMB_SIZE;
            let ctx = canvas.getContext('2d');
        
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const loadImage = (src) => new Promise((resolve) => {
                let img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });

            for (let i = 0; i < items.length; i++) {
                if (items[i].img) {
                    let img = await loadImage(items[i].img);
                    let x = (i % cols) * THUMB_SIZE;
                    let y = Math.floor(i / cols) * THUMB_SIZE;
                    ctx.drawImage(img, x, y, THUMB_SIZE, THUMB_SIZE);
                }
            }
            return canvas.toDataURL('image/jpeg', 0.6); 
        }
        
        function sendReport() {
            showStatus("กำลังสั่งส่งรายงาน...");
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: 'REPORT' })
            }).then(() => {
                showStatus("✅ สั่งส่งรายงานเรียบร้อยแล้ว!");
            }).catch((err) => {
                showStatus("⚠️ เกิดข้อผิดพลาดในการส่งข้อมูล");
                console.error(err);
            });
        }

        function finishSale() { 
            if(Object.keys(groupedItems).length === 0) return showStatus("ยังไม่มีสินค้าในตะกร้า!"); 
            
            let mode = localStorage.getItem('zenMode') || 'SELL';
            
            // 🌟 ให้เสียงพูดเริ่มทำงานทันทีก่อนกระบวนการที่กิน CPU หนักๆ จะเริ่ม
            let totalToSpeak = calculateTotal();
            if (mode === 'SELL' || mode === 'BUY') {
                speakText(totalToSpeak + " บาท ขอบคุณค่ะ");
            }

            let allItems = Object.values(groupedItems);
            let itemsToSync = allItems.map(i => {
                return { 
                    code: i.code, 
                    qty: i.qty, 
                    price: getCellData(i.code, 'price', 0), 
                    cost: getCellData(i.code, 'cost', 0), 
                    supplier: getCellData(i.code, 'supplier', ''),
                    stock: getCellData(i.code, 'stock', 0)
                };
            });
            let batch1 = allItems.slice(0, 16);
            let batch2 = allItems.slice(16, 32);

            groupedItems = {}; 
            refreshList(); 
            calculateTotal();
            showStatus("⏳ เคลียร์หน้าจอแล้ว! (กำลังบันทึกบิลเบื้องหลัง)");

            // 🌟 หน่วงเวลา (Delay) 500 ms เพื่อให้ CPU ว่าง ให้เสียงมีเวลาโหลดและเปล่งออกมาก่อน
            setTimeout(() => {
                (async () => {
                    try {
                        let collage1 = await createCollage(batch1);
                        let collage2 = await createCollage(batch2);

                        fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ mode: mode, items: itemsToSync, collage1: collage1, collage2: collage2 })
                        }).then(() => {
                            console.log("✅ บันทึกบิลเบื้องหลังและส่ง Telegram เสร็จสิ้น!");
                        }).catch((err) => {
                            console.error("⚠️ เกิดข้อผิดพลาดในการส่งข้อมูลเบื้องหลัง:", err);
                        });
                    } catch(err) {
                        console.error("⚠️ Error in background task:", err);
                    }
                })(); 
            }, 500); 
        }

        window.onload = async () => {
            let m = localStorage.getItem('zenMode') || 'SELL'; 
            document.getElementById('modeSelect').value = m; 
            applyModeColor(m);
            
            document.getElementById('btnReport').style.display = (m === 'CHECK') ? 'block' : 'none';

            await loadSheetData(); 
            
            html5QrcodeScanner = new Html5QrcodeScanner("reader", {
                fps: 10,
                qrbox: {width: 200, height: 60},
                facingMode: "environment",
                formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.QR_CODE]
            });
            html5QrcodeScanner.render(onScanSuccess); 
            resetIdleTimer(); 
            
            document.addEventListener('mousemove', resetIdleTimer); 
            document.addEventListener('touchstart', resetIdleTimer); 
            document.addEventListener('click', resetIdleTimer);
        };
    </script>
</body>
</html>
