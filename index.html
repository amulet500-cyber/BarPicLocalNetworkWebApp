<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สแกนสินค้า ศิษย์พี่ - Offline First Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- นำเข้าไลบรารี -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- ไฟล์ CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS สำหรับ Payment Panel ปรับแต่งพิเศษ ป้องกันจอล้น (No Overflow) */
        .overlay-panel { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            z-index: 999999; 
            justify-content: center; 
            align-items: center; 
        }
        .panel-content { 
            background: white; 
            padding: 15px 18px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            max-height: 98vh;
            box-sizing: border-box;
        }
        .close-btn { 
            position: absolute; 
            top: 10px; 
            right: 15px; 
            background: none; 
            border: none; 
            font-size: 20px; 
            cursor: pointer; 
        }
        
        .highlight-text { 
            font-size: 1.1em; 
            font-weight: bold; 
            color: #d32f2f; 
            margin: 3px 0; 
        }
        
        .grid-bank { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            margin-top: 8px; 
        }
        .grid-key { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            margin-top: 8px; 
        }
        .btn-bank { 
            padding: 8px 4px; 
            border-radius: 8px; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            background: #3498db; 
            color: white; 
        }
        .btn-key { 
            padding: 8px 4px; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background: #ecf0f1; 
        }
        .btn-clear { 
            padding: 8px 4px; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background: #e74c3c; 
            color: white; 
        }

        /* แถบปุ่มดำเนินการคู่ล่าง: เงินสด และ สลิปโอน วางเคียงข้างกัน */
        .pay-action-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-ok { 
            flex: 1;
            padding: 10px 4px; 
            border-radius: 10px; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            background: #27ae60; 
            color: white; 
            box-shadow: 0 3px 8px rgba(39, 174, 96, 0.3);
            transition: all 0.2s ease;
        }
        .btn-slip { 
            flex: 1;
            padding: 10px 4px; 
            border-radius: 10px; 
            border: none; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            background: linear-gradient(135deg, #8e44ad, #9b59b6); 
            color: white; 
            box-shadow: 0 3px 8px rgba(142, 68, 173, 0.4); 
            transition: all 0.2s ease; 
        }
        .btn-slip:active, .btn-ok:active { 
            transform: scale(0.98); 
        }

        /* ล็อกแถบวัน เวลา และเวอร์ชัน (Sub-header) */
        #topHeaderContainer {
            width: 100%;
        }
        #subHeaderBar {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            background: #000000 !important;
            color: #ffffff !important;
            padding: 4px 10px !important;
            font-size: 0.8em !important;
            height: auto !important;
            box-sizing: border-box !important;
        }

        /* เอฟเฟกต์ขยาย-หด สำหรับทุกช่องกรอกข้อมูลในตาราง */
        .item-input {
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease !important;
        }
        
        .item-input:focus {
            transform: scale(2.2) !important;
            z-index: 99999 !important;
            position: relative !important;
            background-color: #ffffff !important;
            color: #000000 !important;
            border: 2px solid #e74c3c !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.9) !important;
            outline: none !important;
        }

        /* เอฟเฟกต์เบลอช่อง "ทุน" (เวลาลูกค้ามอง) */
        .cost-input {
            color: transparent !important;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.8) !important;
            transition: all 0.2s ease !important;
        }

        .cost-input:focus {
            color: #000000 !important;
            text-shadow: none !important;
        }

        /* โหมดพักหน้าจอ จอดำสนิท ประหยัดพลังงาน OLED/AMOLED */
        #sleepOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000 !important;
            z-index: 9999999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            user-select: none;
        }

        .zzz-icon {
            font-size: 75px;
            letter-spacing: 10px;
            animation: zzzPulse 2.5s infinite alternate ease-in-out;
        }

        .zzz-text {
            color: #888888;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 2px;
            animation: zzzPulse 2.5s infinite alternate ease-in-out;
        }

        @keyframes zzzPulse {
            0% { opacity: 0.2; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1.15); }
        }

        /* Styling เพิ่มเติมสำหรับ Settings Modal */
        .settings-field {
            text-align: left;
            margin-bottom: 10px;
        }
        .settings-field label {
            display: block;
            font-size: 0.85em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 3px;
        }
        .settings-field input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 0.9em;
            box-sizing: border-box;
        }
    </style>
</head>
<body onclick="wakeScanner()">
    
    <div id="printArea"></div>

    <!-- แถบ Header รวม -->
    <div id="topHeaderContainer">
        <div id="headerBar">
            <div style="display:flex; align-items:center;">
                <select id="modeSelect" onchange="handleMenuSelect(this)">
                    <option value="SELL">💰 ขาย</option>
                    <option value="BUY">🛒 ซื้อ</option>
                    <option value="CHECK">🔍 เช็ค</option>
                    <option value="productData">📑 สินค้า</option>
                </select>
                <input type="text" id="deviceNameInput" placeholder="📱 ชื่อเครื่อง" style="background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #fff; padding: 2px 4px; font-size: 0.85em; border-radius: 4px; margin-left: 5px; width: 85px; text-align: center;">
            </div>

            <select id="reportMenu" onchange="handleMenuAction(this.value)" style="padding: 5px; border-radius: 5px; max-width: 95px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #fff;">
                <option value="" disabled selected>📚 เมนู</option>
                <option value="force-sync" style="background:#2c3e50;">📥 อัปเดตข้อมูล</option>
                <option value="open-settings" style="background:#34495e;">⚙️ ตั้งค่าระบบ</option>
                <optgroup label="🖨️ พิมพ์">
                    <option value="print-cart">พิมพ์ ตะกร้าสินค้า</option>
                    <option value="print-today">พิมพ์ ยอดวันนี้</option>
                    <option value="print-low">พิมพ์ สต็อกใกล้หมด</option>
                    <option value="print-best">พิมพ์ สินค้าขายดี</option>
                </optgroup>
                <optgroup label="✈️ Telegram">
                    <option value="tg-low">แจ้งสต็อกใกล้หมด</option>
                    <option value="tg-best">แจ้งสินค้าขายดี</option>
                    <option value="tg-info">ข้อมูลร้าน</option>
                </optgroup>
            </select>
            
            <div id="syncBadge">รอยืนยัน 0</div>
        </div>

        <div id="subHeaderBar">
            <div id="versionTag" style="font-size: 0.9em; color: #f1c40f; font-weight: bold;"></div>
            <div id="clock">--:--:--</div>
        </div>
    </div>

    <div id="scanner-wrapper" style="position: relative; width: 100%;">
        <div id="reader" style="width: 100%;"></div>
        
        <div id="scan-preview-overlay">
            <img id="last-scanned-img" src="">
        </div>
    </div>

    <!-- โหมดหลับดำสนิท -->
    <div id="sleepOverlay" onclick="wakeScanner()">
        <div class="zzz-icon">😴 😪 💤</div>
        <div class="zzz-text">(แตะเพื่อปลุก)</div>
    </div>
    
    <div id="flash-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; z-index:999999; pointer-events:none; transition: opacity 0.1s;"></div>
    
    <div style="margin-top: -3px; margin-bottom: 10px; text-align: center; position: relative; z-index: 9999;">
        <input type="text" id="manualBarcode" 
               placeholder="⌨️ พิมพ์ค้นหาบาร์โค้ด 6 ตัวท้าย" 
               style="width: 60%; height: 5px; padding: 10px; border-radius: 10px; border: 2px solid rgba(127, 117, 7, 0.954); font-size: 14px; background: rgba(232, 229, 229, 0.3); backdrop-filter: blur(5px);color: #2027ef;">
    </div>

    <div id="cart">
        <h3 onclick="sleepScanner(event)" style="margin:0 0 4px 0;text-align:center;color:#fff;font-size:1em;cursor:pointer;">😙บาร์โค้ด สินค้า😛 (คลิกพักสแกน)</h3>
        <div class="cart-header"><span>รูป</span><span>บาร์โค้ด</span><span>จำนวน</span><span>ราคา</span><span>ทุน</span><span>สต็อก</span><span>ร้าน</span><span>ลบ</span></div>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        
        <div class="bottom-bar">
            <button id="btnCancelBtn" onclick="cancelBasket()">ยกเลิก</button>
            <button id="btnFinish" class="btn-finish" onclick="openPaymentPanel()">ชำระเงิน</button>
            <button id="btnNewBarcode" onclick="showBarcodePreview(event)">📸 ถ่าย</button>
        </div>
    </div>

    <!-- Payment Panel สำหรับชำระเงิน -->
    <div id="paymentPanel" class="overlay-panel">
        <div class="panel-content">
            <button onclick="togglePayment(false)" class="close-btn">❌</button>
            
            <div class="status-box">
                <h3 id="totalDisplay" style="margin: 0; font-size: 1.2em; color: #2c3e50;">ยอดรวม: 0 บาท</h3>
                <div class="highlight-text">รับมา: <span id="receivedDisplay">0</span> บาท</div>
                <div class="highlight-text">ทอน: <span id="changeDisplay">0</span> บาท</div>
            </div>

            <div class="grid-bank">
                <button class="btn-bank" onclick="addCash(10)">10</button>
                <button class="btn-bank" onclick="addCash(20)">20</button>
                <button class="btn-bank" onclick="addCash(50)">50</button>
                <button class="btn-bank" onclick="addCash(100)">100</button>
                <button class="btn-bank" onclick="addCash(500)">500</button>
                <button class="btn-bank" onclick="addCash(1000)">1000</button>
            </div>
            <div class="grid-key">
                <button class="btn-key" onclick="pressNum(1)">1</button>
                <button class="btn-key" onclick="pressNum(2)">2</button>
                <button class="btn-key" onclick="pressNum(3)">3</button>
                <button class="btn-key" onclick="pressNum(4)">4</button>
                <button class="btn-key" onclick="pressNum(5)">5</button>
                <button class="btn-key" onclick="pressNum(6)">6</button>
                <button class="btn-key" onclick="pressNum(7)">7</button>
                <button class="btn-key" onclick="pressNum(8)">8</button>
                <button class="btn-key" onclick="pressNum(9)">9</button>
                <button class="btn-clear" onclick="clearCash()">C</button>
                <button class="btn-key" onclick="pressNum(0)">0</button>
                <button class="btn-key" onclick="pressNum('00')">00</button>
            </div>

            <!-- แถบปุ่มดำเนินการ: เงินสด และ สลิปโอน -->
            <div class="pay-action-group">
                <button class="btn-ok" onclick="confirmPayment()">💵 เงินสด</button>
                <button class="btn-slip" onclick="openSlipModal(event)">📸 สลิปโอน</button>
            </div>
        </div>
    </div>

    <!-- Modal สำหรับแสดงกล้องสด Live Preview และถ่ายสลิปโอนเงิน -->
    <div id="slipModal" class="overlay-panel">
        <div class="panel-content" style="max-width: 380px;">
            <button onclick="closeSlipModal()" class="close-btn">❌</button>
            <h3 style="margin: 0 0 10px 0; color: #8e44ad; font-size: 1.2em;">📸 ถ่ายสลิปโอนเงิน</h3>
            
            <!-- กรอบแสดงวิดีโอกล้องสด Live Feed -->
            <div style="position: relative; width: 100%; height: 250px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 12px; border: 2px solid #8e44ad;">
                <canvas id="slipPreviewCanvas" style="width: 100%; height: 100%; object-fit: cover;"></canvas>
                <div style="position: absolute; bottom: 6px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 0.78em; text-shadow: 0 1px 3px rgba(0,0,0,0.9); background: rgba(0,0,0,0.5); padding: 3px 0;">
                    จัดสลิปให้อยู่ในช่อง แล้วกดปุ่มถ่ายรูป
                </div>
            </div>

            <div style="display: flex; gap: 8px;">
                <button class="btn-slip" style="padding: 12px 4px; font-size: 15px;" onclick="captureSlipFromCamera()">📸 ถ่ายรูปสด</button>
                <button class="btn-bank" style="background: #34495e; padding: 12px 4px; font-size: 15px;" onclick="triggerSlipFileInput()">📁 เลือกรูป</button>
            </div>
            
            <input type="file" id="slipFileInput" accept="image/*" style="display:none;" onchange="handleSlipSelected(event)">
        </div>
    </div>

    <!-- Modal ตั้งค่าระบบ (Settings Modal) -->
    <div id="settingsModal" class="overlay-panel">
        <div class="panel-content" style="max-width: 400px; text-align: left;">
            <button onclick="closeSettingsModal()" class="close-btn">❌</button>
            <h3 style="margin: 0 0 15px 0; color: #2c3e50; text-align: center;">⚙️ ตั้งค่าระบบ</h3>
            
            <div class="settings-field">
                <label for="settingBotToken">🤖 Telegram Bot Token:</label>
                <input type="text" id="settingBotToken" placeholder="วาง Bot Token ที่นี่...">
            </div>

            <div class="settings-field">
                <label for="settingChatId">💬 Telegram Chat ID:</label>
                <input type="text" id="settingChatId" placeholder="วาง Chat ID ที่นี่...">
            </div>

            <div class="settings-field">
                <label for="settingWebUrl">🌐 Web App URL (Google Apps Script):</label>
                <input type="text" id="settingWebUrl" placeholder="https://script.google.com/macros/s/.../exec">
            </div>

            <div class="settings-field">
                <label for="settingDeviceName">📱 ชื่อเครื่องมือถือ (ใช้คำนวณยอดขาย):</label>
                <input type="text" id="settingDeviceName" placeholder="ระบุชื่อเครื่อง เช่น พนักงานA">
            </div>

            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <button class="btn-ok" style="background: #27ae60;" onclick="saveSettings()">💾 บันทึกตั้งค่า</button>
                <button class="btn-clear" style="background: #7f8c8d;" onclick="closeSettingsModal()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Dialog สำหรับจัดการสินค้า -->
    <dialog id="productDialog" style="border:none; border-radius:15px; width:90%; max-width:500px; padding:0; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="padding:20px;">
            <h3 style="text-align:center; margin-top:0;">📑 จัดการสินค้า</h3>
            <div id="productContent" style="max-height: 400px; overflow-y: auto;">
                <p style="text-align:center;">กำลังโหลดข้อมูล...</p>
            </div>
            <button onclick="document.getElementById('productDialog').close()" 
                    style="width:100%; padding:12px; background:#e74c3c; color:white; border:none; border-radius:5px; margin-top:15px; font-weight:bold;">
                ปิดหน้าต่าง
            </button>
        </div>
    </dialog>

    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const itemList = document.getElementById('itemList');
            if(itemList) {
                itemList.addEventListener('keydown', function(event) {
                    if (event.target && event.target.classList.contains('item-input')) {
                        if (event.key === 'Enter') {
                            event.target.blur();
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
