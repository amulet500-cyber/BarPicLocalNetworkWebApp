<!DOCTYPE html>
<html>
<head>
    <title>สแกนสินค้า ศิษย์พี่ Zen</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        #reader__filescan_input, #reader__filescan_input + span, #reader__filescan_input + a { display: none !important; }
        #reader button { padding: 15px 30px !important; font-size: 1.2em !important; font-weight: bold !important; border: none !important; border-radius: 8px !important; cursor: pointer !important; margin: 10px 5px !important; color: white !important; background-image: none !important; box-shadow: none !important; text-shadow: none !important; }
        #reader button[title="Stop scanning"] { background-color: #ff4757 !important; }
        #reader button[title="Start scanning"] { background-color: #2ed573 !important; }
        #cart { margin: 10px auto; width: 90%; max-width: 500px; border: 2px solid #3498db; padding: 10px; border-radius: 10px; background: white; }
        #itemList { height: 250px; overflow-y: auto; text-align: left; list-style-type: none; padding: 5px; background: #f9f9f9; border: 1px solid #ddd; margin-bottom: 10px; }
        .item-row { padding: 8px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .item-row img { width: 50px; height: 50px; margin-right: 10px; border: 1px solid #ccc; object-fit: cover; }
        .item-price { width: 70px; padding: 5px; text-align: center; border: 1px solid #999; border-radius: 4px; }
        .btn-finish { width: 100%; padding: 15px; font-size: 1.3em; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #statusMessage { color: #e67e22; font-weight: bold; margin: 10px 0; min-height: 25px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>ระบบสแกนสินค้า ศิษย์พี่ Zen</h1>
    <div id="reader"></div>
    <video id="cameraStream" style="display:none;"></video>
    <canvas id="snapshotCanvas" style="display:none;"></canvas>

    <div id="cart">
        <h3>ตะกร้าสินค้า</h3>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        <button id="btnFinish" class="btn-finish" onclick="finishSale()">ชำระเงิน 0 บาท</button>
    </div>

    <script>
        const SERVER_IP = '192.168.1.200';
        let scannedItems = []; 
        let html5QrcodeScanner;

        function showStatus(msg) {
            const statusDiv = document.getElementById("statusMessage");
            statusDiv.innerText = msg;
            setTimeout(() => { statusDiv.innerText = ""; }, 3000);
        }

        function calculateTotal() {
            let total = 0;
            const prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            scannedItems.forEach(item => {
                total += parseFloat(prices[item.code] || 0);
            });
            document.getElementById("btnFinish").innerText = "ชำระเงิน " + total + " บาท";
        }

        function takeSnapshot() {
            const video = document.getElementsByTagName('video')[0];
            const canvas = document.getElementById('snapshotCanvas');
            if (video && video.videoWidth > 0) {
                canvas.width = 100;
                canvas.height = 100;
                canvas.getContext('2d').drawImage(video, 0, 0, 100, 100);
                return canvas.toDataURL('image/jpeg', 0.5);
            }
            return "";
        }

        function updateLocalPrice(code, price) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            prices[code] = price;
            localStorage.setItem('productPrices', JSON.stringify(prices));
            calculateTotal();
        }

        function getSavedPrice(code) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            return prices[code] || ''; 
        }

        async function onScanSuccess(decodedText, decodedResult) {
            const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            audio.play();

            let imgData = takeSnapshot(); 
            let price = getSavedPrice(decodedText);
            let newItem = { code: decodedText, img: imgData, price: price, time: new Date().toLocaleTimeString() };
            scannedItems.push(newItem);

            let li = document.createElement("li");
            li.className = "item-row";
            li.innerHTML = `<img src="${imgData}"> 
                            <span>${scannedItems.length}. ${decodedText}</span> 
                            <input type="number" class="item-price" value="${price}" 
                            placeholder="ราคา"
                            onfocus="this.select()"
                            onkeypress="if(event.key==='Enter') this.blur()"
                            onchange="updateLocalPrice('${decodedText}', this.value)">`;
            
            document.getElementById("itemList").appendChild(li);
            li.scrollIntoView({ behavior: 'smooth', block: 'end' });
            calculateTotal();

            fetch(`http://${SERVER_IP}:5000/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: [newItem] })
            }).catch(() => showStatus("⚠️ ออฟไลน์: บันทึกข้อมูลลงเครื่องมือถือ"));
            
            html5QrcodeScanner.pause();
            setTimeout(() => { html5QrcodeScanner.resume(); }, 1500); 
        }

        function finishSale() {
            if (scannedItems.length === 0) return showStatus("ยังไม่มีสินค้าครับ!");
            
            fetch(`http://${SERVER_IP}:5000/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "finish" })
            })
            .then(() => {
                showStatus("✅ ชำระเงินสำเร็จ!");
                scannedItems = [];
                document.getElementById("itemList").innerHTML = "";
                calculateTotal();
            })
            .catch(() => {
                let localData = JSON.parse(localStorage.getItem('pendingSales') || '[]');
                localData.push(...scannedItems);
                localStorage.setItem('pendingSales', JSON.stringify(localData));
                showStatus("⚠️ ออฟไลน์: ข้อมูลถูกเก็บในมือถือแล้ว");
                scannedItems = [];
                document.getElementById("itemList").innerHTML = "";
                calculateTotal();
            });
        }

        window.onload = () => {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 250, height: 100 }, 
                facingMode: "environment",
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_128
                ]
            });
            html5QrcodeScanner.render(onScanSuccess);
        };
    </script>
</body>
</html>
