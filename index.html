<!DOCTYPE html>
<html>
<head>
    <title>สแกนสินค้า ศิษย์พี่ Zen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #reader__dashboard_section { position: fixed; top: 0; left: 0; width: 100%; z-index: 200; background: #333; padding: 2px 0; }
        
        /* ปรับให้กล้องเล็กลง (30vh) เพื่อเปิดพื้นที่ให้ตะกร้า */
        #reader { position: fixed; top: 40px; left: 0; width: 100%; height: 30vh; z-index: 1; }
        
        #reader__filescan_input, #reader__filescan_input + span, #reader__filescan_input + a { display: none !important; }
        #reader button { padding: 4px 10px !important; font-size: 0.8em !important; border: none !important; border-radius: 4px !important; color: white !important; }
        
        /* เลื่อนตระกร้าขึ้นมาที่ 35vh แทน (เลขยิ่งน้อย ยิ่งอยู่สูง) */
        #cart { 
            position: fixed; top: 35vh; bottom: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px 15px 0 0; padding: 10px; z-index: 100;
            box-sizing: border-box; display: flex; flex-direction: column;
        }
        
        #itemList { flex-grow: 1; overflow-y: auto; list-style-type: none; padding: 0; margin: 0 0 5px 0; border-top: 1px solid #999; }
        .item-row { padding: 5px; border-bottom: 1px solid #777; display: flex; align-items: center; justify-content: space-between; font-size: 0.75em; color: white; }
        .item-row img { width: 30px; height: 30px; margin-right: 5px; border: 1px solid #ccc; object-fit: cover; }
        
        .input-group { display: flex; gap: 3px; }
        .item-input { width: 40px; padding: 2px; text-align: center; border: 1px solid #555; border-radius: 3px; font-size: 0.9em; }
        
        .btn-finish { width: 100%; padding: 10px; font-size: 1.1em; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #statusMessage { color: #f1c40f; font-weight: bold; text-align: center; height: 18px; margin-bottom: 5px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <video id="cameraStream" style="display:none;"></video>
    <canvas id="snapshotCanvas" style="display:none;"></canvas>

    <div id="cart">
        <h3 style="margin: 0 0 5px 0; text-align: center; color: white;">ตะกร้าสินค้า</h3>
        <ul id="itemList"></ul>
        <div id="statusMessage"></div>
        <button id="btnFinish" class="btn-finish" onclick="finishSale()">ชำระเงิน 0 บาท</button>
    </div>

    <script>
        const SERVER_IP = '192.168.1.200';
        let scannedItems = []; 
        let html5QrcodeScanner;

        function showStatus(msg) {
            const statusDiv = document.getElementById("statusMessage");
            statusDiv.innerText = msg;
            setTimeout(() => { statusDiv.innerText = ""; }, 3000);
        }

        function calculateTotal() {
            let total = 0;
            const prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            scannedItems.forEach(item => { total += parseFloat(prices[item.code] || 0); });
            document.getElementById("btnFinish").innerText = "ชำระเงิน " + total + " บาท";
        }

        function takeSnapshot() {
            const video = document.getElementsByTagName('video')[0];
            const canvas = document.getElementById('snapshotCanvas');
            if (video && video.videoWidth > 0) {
                canvas.width = 100; canvas.height = 100;
                canvas.getContext('2d').drawImage(video, 0, 0, 100, 100);
                return canvas.toDataURL('image/jpeg', 0.5);
            }
            return "";
        }

        function updateLocalPrice(code, price) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            prices[code] = price;
            localStorage.setItem('productPrices', JSON.stringify(prices));
            calculateTotal();
        }

        function updateLocalStock(code, stock) {
            let stocks = JSON.parse(localStorage.getItem('productStocks') || '{}');
            stocks[code] = stock;
            localStorage.setItem('productStocks', JSON.stringify(stocks));
        }

        function getSavedPrice(code) {
            let prices = JSON.parse(localStorage.getItem('productPrices') || '{}');
            return prices[code] || ''; 
        }

        function getSavedStock(code) {
            let stocks = JSON.parse(localStorage.getItem('productStocks') || '{}');
            return parseInt(stocks[code] || 0); 
        }

        async function onScanSuccess(decodedText, decodedResult) {
            new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            
            let currentStock = getSavedStock(decodedText);
            let newStock = currentStock > 0 ? currentStock - 1 : 0;
            updateLocalStock(decodedText, newStock);

            let imgData = takeSnapshot(); 
            let price = getSavedPrice(decodedText);
            let newItem = { code: decodedText, img: imgData, price: price, stock: newStock, time: new Date().toLocaleTimeString() };
            scannedItems.push(newItem);

            let li = document.createElement("li");
            li.className = "item-row";
            li.innerHTML = `<img src="${imgData}"> 
                            <span style="flex-grow:1; padding:0 5px; word-break: break-all;">${decodedText}</span> 
                            <div class="input-group">
                                <input type="number" class="item-input" value="${price}" placeholder="ราคา" onchange="updateLocalPrice('${decodedText}', this.value)">
                                <input type="number" class="item-input" value="${newStock}" placeholder="สต็อก" onchange="updateLocalStock('${decodedText}', this.value)">
                            </div>`;
            
            document.getElementById("itemList").appendChild(li);
            li.scrollIntoView({ behavior: 'smooth', block: 'end' });
            calculateTotal();

            fetch(`http://${SERVER_IP}:5000/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: [newItem] })
            }).catch(() => showStatus("⚠️ ออฟไลน์"));
            
            html5QrcodeScanner.pause();
            setTimeout(() => { html5QrcodeScanner.resume(); }, 1500); 
        }

        function finishSale() {
            if (scannedItems.length === 0) return showStatus("ยังไม่มีสินค้าครับ!");
            fetch(`http://${SERVER_IP}:5000/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "finish" })
            }).then(() => {
                showStatus("✅ สำเร็จ!");
                scannedItems = [];
                document.getElementById("itemList").innerHTML = "";
                calculateTotal();
            }).catch(() => {
                let localData = JSON.parse(localStorage.getItem('pendingSales') || '[]');
                localData.push(...scannedItems);
                localStorage.setItem('pendingSales', JSON.stringify(localData));
                showStatus("⚠️ บันทึกในมือถือ");
                scannedItems = [];
                document.getElementById("itemList").innerHTML = "";
                calculateTotal();
            });
        }

        window.onload = () => {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 200, height: 60 }, 
                facingMode: "environment",
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            });
            html5QrcodeScanner.render(onScanSuccess);
        };
    </script>
</body>
</html>
